name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --release --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL || 'https://iptv-player-preview-1.preview.emergentagent.com' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ElensarTV-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
